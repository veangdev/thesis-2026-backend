services:
  postgres:
    image: postgres:16-alpine
    container_name: pnc_journey_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pnc_journey_star
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    container_name: pnc_journey_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Inside the compose network the app reaches Postgres on its service name.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pnc_journey_star?schema=public
      # Seed demo users (admin/mentor/student) on first boot. Idempotent.
      SEED_ON_START: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
