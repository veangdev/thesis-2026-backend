name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pnc_journey_star_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pnc_journey_star_test?schema=public
      JWT_SECRET: ci-access-secret-min-16-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh-secret-min-16-chars
      JWT_REFRESH_EXPIRES_IN: 7d

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma generate

      - name: Lint
        run: yarn lint:check

      - name: Typecheck
        run: yarn typecheck

      - name: Apply migrations
        run: yarn prisma migrate deploy

      - name: Unit tests
        run: yarn test

      - name: E2E tests
        run: yarn test:e2e

      - name: Build
        run: yarn build
